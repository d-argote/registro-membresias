</a>
<a class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-all duration-200 hover:bg-slate-100 dark:hover:bg-slate-800/50" href="#">
<span class="material-symbols-outlined" data-icon="admin_panel_settings">admin_panel_settings</span>

<div class="max-w-6xl mx-auto py-12">
<!-- Header Section: 12-column grid applied -->
<div class="grid grid-cols-12 gap-8 mb-16">
<div class="col-start-3 col-end-11">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant mb-4">Plan Definition</label>
<input class="w-full text-4xl font-black tracking-tighter bg-transparent border-0 border-b border-outline-variant/20 focus:ring-0 focus:border-primary px-0 pb-4 placeholder:text-surface-dim transition-all" placeholder="Nombre del Plan de Entrenamiento" type="text"/>
<div class="mt-12 relative">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant mb-4">Objetivo General del Plan</label>
<textarea class="w-full text-lg bg-surface-container-low/50 border-0 border-b border-outline-variant/20 focus:ring-0 focus:border-primary p-6 placeholder:text-slate-400/50 resize-none" placeholder="Describe el enfoque principal de este entrenamiento..." rows="3"></textarea>
<span class="absolute bottom-4 right-4 text-[10px] font-mono text-on-surface-variant">0 / 250</span>
</div>
</div>
</div>
<!-- Main Section: Dynamic Exercise Cards -->
<div class="grid grid-cols-12 gap-8">
<div class="col-start-3 col-end-11 space-y-8">
<!-- Exercise Card 1 -->
<div class="bg-surface-container-lowest p-8 border border-outline-variant/10 rounded-lg relative group transition-all hover:border-outline-variant/40">
<button class="absolute top-6 right-6 text-error opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1 text-[10px] font-bold uppercase tracking-widest">
<span class="material-symbols-outlined text-sm" data-icon="delete">delete</span>
                            Eliminar
                        </button>
<div class="grid grid-cols-1 gap-8">
<div>
<label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mb-2">Nombre del Ejercicio</label>
<input class="w-full text-xl font-bold bg-transparent border-0 border-b border-outline-variant/20 focus:ring-0 focus:border-primary px-0 pb-2" type="text" value="Press de Banca con Barra"/>
</div>
<div class="flex gap-12">
<div class="w-24">
<label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mb-2">Series</label>
<input class="w-full bg-surface-container-low border-0 text-center font-bold py-3" type="number" value="4"/>
</div>
<div class="w-24">
<label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mb-2">Reps</label>
<input class="w-full bg-surface-container-low border-0 text-center font-bold py-3" type="number" value="12"/>
</div>
<div class="w-32">

<input class="w-full bg-surface-container-low border-0 text-center font-bold py-3" type="number" value="90"/>
</div>
</div>
<div>
<label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mb-2">Instrucciones específicas (Opcional)</label>

</div>
</div>
</div>

<span class="material-symbols-outlined text-sm" data-icon="delete">delete</span>

<div class="grid grid-cols-1 gap-8">
<div>

<input class="w-full text-xl font-bold bg-transparent border-0 border-b border-outline-variant/20 focus:ring-0 focus:border-primary px-0 pb-2" type="text" value="Aperturas con Mancuernas"/>
</div>
<div class="flex gap-12">
<div class="w-24">
<label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mb-2">Series</label>
<input class="w-full bg-surface-container-low border-0 text-center font-bold py-3" type="number" value="3"/>
</div>
<div class="w-24">

<input class="w-full bg-surface-container-low border-0 text-center font-bold py-3" type="number" value="15"/>

<div class="w-32">

</div>
</div>
<div>

<textarea class="w-full bg-surface-container-low/30 border-0 p-4 text-sm resize-none focus:ring-1 focus:ring-primary/10" placeholder="Ej: Mantener ligera flexión en los codos..." rows="2"></textarea>
</div>
</div>
</div>

<span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform" data-icon="add_circle">add_circle</span>
<span class="text-xs font-bold uppercase tracking-widest">+ Añadir nuevo ejercicio</span>
</button>

<button class="px-10 py-3 bg-primary text-on-primary text-xs font-bold uppercase tracking-widest rounded transition-all hover:bg-slate-800 active:scale-95 shadow-xl shadow-black/5">
