<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 48;
        }
        .kinetic-bg {
            background-color: #EF4444; /* Specific vibrant red requested */
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#000000",
              "on-primary": "#ffffff",
              "secondary-fixed": "#d5e3fc",
              "surface-tint": "#0053db",
              "on-secondary": "#ffffff",
              "on-surface-variant": "#45464d",
              "primary-container": "#00174b",
              "background": "#f9f9ff",
              "tertiary": "#000000",
              "surface-dim": "#cfdaf2",
              "primary-fixed-dim": "#b4c5ff",
              "on-error": "#ffffff",
              "on-primary-fixed": "#00174b",
              "surface-container": "#e7eeff",
              "secondary": "#515f74",
              "surface-container-high": "#dee8ff",
              "on-secondary-fixed-variant": "#3a485b",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f0f3ff",
              "secondary-fixed-dim": "#b9c7df",
              "on-secondary-container": "#57657a",
              "inverse-primary": "#b4c5ff",
              "surface-bright": "#f9f9ff",
              "on-tertiary-container": "#b87500",
              "on-background": "#111c2d",
              "surface-variant": "#d8e3fb",
              "on-error-container": "#93000a",
              "surface": "#f9f9ff",
              "on-tertiary-fixed-variant": "#653e00",
              "on-tertiary-fixed": "#2a1700",
              "outline-variant": "#c6c6cd",
              "primary-fixed": "#dbe1ff",
              "on-secondary-fixed": "#0d1c2e",
              "error": "#ba1a1a",
              "error-container": "#ffdad6",
              "on-primary-fixed-variant": "#003ea8",
              "surface-container-highest": "#d8e3fb",
              "outline": "#76777d",
              "on-surface": "#111c2d",
              "secondary-container": "#d5e3fc",
              "inverse-surface": "#263143",
              "tertiary-fixed": "#ffddb8",
              "tertiary-container": "#2a1700",
              "on-tertiary": "#ffffff",
              "on-primary-container": "#497cff",
              "tertiary-fixed-dim": "#ffb95f",
              "inverse-on-surface": "#ecf1ff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
</head>
<body class="font-body kinetic-bg h-screen w-screen overflow-hidden flex flex-col items-center justify-center text-white">
<!-- Access Denied Screen (Physical Display Optimized) -->
<main class="relative z-10 w-full h-full flex flex-col items-center justify-center p-8 text-center">
<!-- Large Icon Section -->
<div class="mb-12 flex items-center justify-center">
<span class="material-symbols-outlined text-[24rem] md:text-[32rem] leading-none" data-icon="block">
                block
            </span>
</div>
<!-- Primary Feedback -->
<div class="space-y-4 max-w-5xl">
<h1 class="text-7xl md:text-[10rem] font-black tracking-tighter leading-none mb-6">
                ACCESO DENEGADO
            </h1>
<!-- Secondary Dynamic Information -->
<div class="inline-flex items-center px-12 py-6 bg-black/20 backdrop-blur-md rounded-full">
<p class="text-3xl md:text-5xl font-bold tracking-tight opacity-90">
                    Membresía vencida desde el 15/03/2026
                </p>
</div>
</div>
<!-- Subtle Branding / Status (Non-Interactive) -->
<div class="absolute bottom-12 left-0 right-0 flex flex-col items-center gap-2">
<div class="h-1 w-64 bg-white/30 rounded-full overflow-hidden">
<div class="h-full bg-white w-1/3"></div>
</div>
<p class="text-sm font-label uppercase tracking-widest opacity-50">
                The Atelier Precision Management System
            </p>
</div>
</main>
<!-- Visual Texture Overlay -->
<div class="absolute inset-0 pointer-events-none opacity-20" data-alt="Dark vignette gradient overlay for high contrast" style="background-image: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);">
</div>
</body></html>
